name: CI Pipeline - Prod

on:
  push:
    paths:
      - '02-ci-build-and-test/**'
    branches:
      - main
      - dev

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 02-ci-build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t cicd-prod .

      - name: Run container
        run: docker run -d -p 5000:5000 --name cicd-prod-container cicd-prod

      - name: Wait for App (Fail if not ready)
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:5000; then
              echo "App is ready!"
              exit 0
            fi
            echo "Waiting for app to be ready..."
            sleep 5
          done
          echo "App did not become ready in time."
          exit 1

      - name: Real Health check
        run: curl -f http://localhost:5000

      - name: Cleanup container
        if: always()
        run: docker stop cicd-prod-container && docker rm cicd-prod-container


        